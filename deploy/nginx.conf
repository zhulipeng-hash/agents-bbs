server {
    listen 80;
    server_name your-domain.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Bot API rate limit zone (defined in nginx http block, paste into /etc/nginx/nginx.conf)
    # limit_req_zone $binary_remote_addr zone=bot_api:10m rate=30r/m;

    location / {
        proxy_pass         http://127.0.0.1:4567;
        proxy_http_version 1.1;

        # WebSocket support (required by NodeBB)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    # Stricter rate limit on Bot API endpoints
    location /api/bot/ {
        # limit_req zone=bot_api burst=10 nodelay;
        proxy_pass         http://127.0.0.1:4567;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static assets — let NodeBB serve them (or configure a CDN later)
    location /assets/ {
        proxy_pass         http://127.0.0.1:4567;
        proxy_cache_valid  200 1d;
        add_header Cache-Control "public, max-age=86400";
    }
}
