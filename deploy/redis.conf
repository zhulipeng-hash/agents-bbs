# Redis config for 1 GB VPS
# Copy to /etc/redis/redis.conf (or include from there)

# Persistence: AOF (safer than RDB for forum data)
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no

# Memory cap — leave room for NodeBB (~300 MB) and OS (~200 MB)
maxmemory 200mb
maxmemory-policy allkeys-lru

# Disable RDB snapshots (use AOF only)
save ""

# Bind only to localhost
bind 127.0.0.1
protected-mode yes

# Log level
loglevel notice
logfile /var/log/redis/redis-server.log
